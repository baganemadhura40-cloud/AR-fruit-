<!DOCTYPE html>
<html>
<head>
    <title>AR Fruit Ninja Pro</title>
    <script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
    <style>
        body { margin: 0; overflow: hidden; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        #ui-container {
            position: fixed; top: 10px; width: 100%; display: flex;
            justify-content: space-around; z-index: 1000; pointer-events: none;
            color: white; text-shadow: 2px 2px 5px rgba(0,0,0,0.8);
        }
        .stat-box { text-align: center; background: rgba(0,0,0,0.3); padding: 5px 15px; border-radius: 10px; }
        #combo-alert {
            position: fixed; top: 40%; left: 50%; transform: translate(-50%, -50%);
            font-size: 3rem; color: #FFD700; display: none; z-index: 1001;
        }
    </style>
</head>
<body>

    <div id="ui-container">
        <div class="stat-box"><h2>Score</h2><h1 id="score">0</h1></div>
        <div class="stat-box"><h2>Time</h2><h1 id="timer">60</h1></div>
        <div class="stat-box"><h2>Lives</h2><h1 id="lives">❤️❤️❤️</h1></div>
    </div>
    <div id="combo-alert">COMBO X2!</div>

    <a-scene embedded arjs="sourceType: webcam; debugUIEnabled: false;" cursor="rayOrigin: mouse">
        <a-assets>
            <audio id="slice-sound" src="https://cdn.freesound.org/previews/240/240566_4420853-lq.mp3"></audio>
            <audio id="bomb-sound" src="https://cdn.freesound.org/previews/360/360602_6633128-lq.mp3"></audio>
        </a-assets>

        <a-entity camera></a-entity>
        <a-entity id="game-world"></a-entity>
    </a-scene>

    <script>
        // Game State Variables
        let score = 0;
        let lives = 3;
        let timeLeft = 60;
        let spawnRate = 1200;
        let lastSliceTime = 0;
        let comboCount = 0;
        let gameActive = true;

        const scoreEl = document.getElementById('score');
        const timerEl = document.getElementById('timer');
        const livesEl = document.getElementById('lives');
        const comboEl = document.getElementById('combo-alert');
        const world = document.getElementById('game-world');

        // Difficulty Progression: Speed up every 10 seconds
        const difficultyInterval = setInterval(() => {
            if (spawnRate > 400) spawnRate -= 100;
        }, 10000);

        // Timer Countdown
        const countdown = setInterval(() => {
            if (!gameActive) return;
            timeLeft--;
            timerEl.innerText = timeLeft;
            if (timeLeft <= 0) endGame("Time's Up!");
        }, 10000);

        function spawnObject() {
            if (!gameActive) return;

            const isBomb = Math.random() < 0.25; // 25% chance for bomb
            const obj = document.createElement('a-sphere');
            
            const startX = (Math.random() - 0.5) * 6;
            const targetY = (Math.random() * 2) + 1;
            
            obj.setAttribute('position', `${startX} -2 -6`);
            obj.setAttribute('radius', '0.35');
            obj.setAttribute('color', isBomb ? '#222' : ['#e74c3c', '#f1c40f', '#2ecc71'][Math.floor(Math.random()*3)]);
            
            // Animation: Toss upward and fall back down
            obj.setAttribute('animation', `property: position; to: ${startX} ${targetY} -6; dur: ${spawnRate}; easing: easeOutQuad`);
            
            obj.addEventListener('mousedown', () => {
                if (isBomb) {
                    handleBomb();
                } else {
                    handleSlice(obj);
                }
            });

            world.appendChild(obj);
            
            // Auto-remove after animation
            setTimeout(() => { if(obj.parentNode) obj.remove(); }, spawnRate * 2);
            
            // Repeat spawning
            setTimeout(spawnObject, spawnRate);
        }

        function handleSlice(el) {
            // Sound
            document.getElementById('slice-sound').play();

            // Combo Logic
            const now = Date.now();
            if (now - lastSliceTime < 500) {
                comboCount++;
                if (comboCount >= 2) {
                    showCombo();
                    score += 10 * comboCount;
                }
            } else {
                comboCount = 0;
            }
            lastSliceTime = now;

            // Score & Animation
            score += 10;
            scoreEl.innerText = score;
            
            el.setAttribute('scale', '1.5 0.1 1.5'); // Flatten effect
            el.setAttribute('color', 'white');
            setTimeout(() => el.remove(), 100);
        }

        function handleBomb() {
            document.getElementById('bomb-sound').play();
            lives--;
            livesEl.innerText = "❤️".repeat(lives);
            
            // Visual Flash
            document.body.style.backgroundColor = "rgba(255,0,0,0.5)";
            setTimeout(() => document.body.style.backgroundColor = "transparent", 200);

            if (lives <= 0) endGame("KABOOM! Game Over");
        }

        function showCombo() {
            comboEl.style.display = 'block';
            setTimeout(() => comboEl.style.display = 'none', 500);
        }

        function endGame(msg) {
            gameActive = false;
            alert(`${msg}\nFinal Score: ${score}`);
            location.reload();
        }

        // Start the loop
        spawnObject();
    </script>
</body>
</html>
